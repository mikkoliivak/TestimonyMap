                var html_964dc706bca1c3644233232bb734a96a = $(`<div id="html_964dc706bca1c3644233232bb734a96a" style="width: 100.0%; height: 100.0%;">     <div style='max-width: 450px; max-height: 600px; overflow-y: auto; font-family: Arial, sans-serif;'>         <h3 style='margin-top: 0; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px;'>             Greenidge         </h3>         <p style='color: #7f8c8d; font-size: 13px;'>             <strong>County:</strong> Yates<br>             <strong>Total Testimonies:</strong> 6         </p>     <hr style='border: 1px solid #ecf0f1;'>             <div style='margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-left: 3px solid #3498db; border-radius: 3px;'>                 <h4 style='margin: 0 0 10px 0; color: #2c3e50; font-size: 14px;'>                     Testimony 1 of 6                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "Those nearby began to hear a low droning noise, described by one resident as the sound of a jet that never lands."                 </p>                 <div style='font-size: 12px; color: #7f8c8d; margin-top: 10px;'>                     <p style='margin: 3px 0;'><strong>Date:</strong> 9-27-2023</p>                     <p style='margin: 3px 0;'><strong>Source:</strong> Earthjustice</p>                     <p style='margin: 8px 0 0 0;'>                         <a href='https://earthjustice.org/article/cleaning-up-crypto' target='_blank' style='color: #3498db; text-decoration: none; font-weight: bold;'>                             📄 Read Full Article →                         </a>                     </p>                 </div>             </div>                          <div style='margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-left: 3px solid #3498db; border-radius: 3px;'>                 <h4 style='margin: 0 0 10px 0; color: #2c3e50; font-size: 14px;'>                     Testimony 2 of 6                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "The organization Earthjustice states that the volume of the machinery in crypto mining facilities can reach 95 decibels, about the same as a moving subway train."                 </p>                 <div style='font-size: 12px; color: #7f8c8d; margin-top: 10px;'>                     <p style='margin: 3px 0;'><strong>Date:</strong> 5-3-2025</p>                     <p style='margin: 3px 0;'><strong>Source:</strong> Ithaca Week</p>                     <p style='margin: 8px 0 0 0;'>                         <a href='https://ithacaweek-ic.com/17097/news/uncertainty-plagues-greenidge-crypto-mine/' target='_blank' style='color: #3498db; text-decoration: none; font-weight: bold;'>                             📄 Read Full Article →                         </a>                     </p>                 </div>             </div>                          <div style='margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-left: 3px solid #3498db; border-radius: 3px;'>                 <h4 style='margin: 0 0 10px 0; color: #2c3e50; font-size: 14px;'>                     Testimony 3 of 6                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "Residents living near mining facilities have reported problems like blood pressure spikes, tinnitus, migraines, permanent hearing loss; and even problems with pets, like hair loss and the development of chronic anxiety in dogs."                 </p>                 <div style='font-size: 12px; color: #7f8c8d; margin-top: 10px;'>                     <p style='margin: 3px 0;'><strong>Date:</strong> 5-3-2025</p>                     <p style='margin: 3px 0;'><strong>Source:</strong> Ithaca Week</p>                     <p style='margin: 8px 0 0 0;'>                         <a href='https://ithacaweek-ic.com/17097/news/uncertainty-plagues-greenidge-crypto-mine/' target='_blank' style='color: #3498db; text-decoration: none; font-weight: bold;'>                             📄 Read Full Article →                         </a>                     </p>                 </div>             </div>                          <div style='margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-left: 3px solid #3498db; border-radius: 3px;'>                 <h4 style='margin: 0 0 10px 0; color: #2c3e50; font-size: 14px;'>                     Testimony 4 of 6                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "In the small village of Dresden, NY, a subdued but constant industrial roar can be heard from the neighborhood streets."                 </p>                 <div style='font-size: 12px; color: #7f8c8d; margin-top: 10px;'>                     <p style='margin: 3px 0;'><strong>Date:</strong> 5-3-2025</p>                     <p style='margin: 3px 0;'><strong>Source:</strong> Ithaca Week</p>                     <p style='margin: 8px 0 0 0;'>                         <a href='https://ithacaweek-ic.com/17097/news/uncertainty-plagues-greenidge-crypto-mine/' target='_blank' style='color: #3498db; text-decoration: none; font-weight: bold;'>                             📄 Read Full Article →                         </a>                     </p>                 </div>             </div>                          <div style='margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-left: 3px solid #3498db; border-radius: 3px;'>                 <h4 style='margin: 0 0 10px 0; color: #2c3e50; font-size: 14px;'>                     Testimony 5 of 6                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "Residents in the Finger Lakes report worsening air quality and constant industrial noise. Tourists who once flocked for peace, wine, and pristine waters now see cooling towers and hear the hum of Bitcoin rigs."                 </p>                 <div style='font-size: 12px; color: #7f8c8d; margin-top: 10px;'>                     <p style='margin: 3px 0;'><strong>Date:</strong> 8-17-2025</p>                     <p style='margin: 3px 0;'><strong>Source:</strong> EcoServants Project</p>                     <p style='margin: 8px 0 0 0;'>                         <a href='https://ecoservantsproject.org/crypto-betrays-creation-greenidges-fossil-fueled-bitcoin-mine-must-be-shut-down/' target='_blank' style='color: #3498db; text-decoration: none; font-weight: bold;'>                             📄 Read Full Article →                         </a>                     </p>                 </div>             </div>                          <div style='margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-left: 3px solid #3498db; border-radius: 3px;'>                 <h4 style='margin: 0 0 10px 0; color: #2c3e50; font-size: 14px;'>                     Testimony 6 of 6                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "Communities across the country are dealing with the same problems — noise, pollution, water usage — and it's time for a national conversation about the true cost of crypto mining."                 </p>                 <div style='font-size: 12px; color: #7f8c8d; margin-top: 10px;'>                     <p style='margin: 3px 0;'><strong>Date:</strong> 1-27-2025</p>                     <p style='margin: 3px 0;'><strong>Source:</strong> Ithaca.com</p>                     <p style='margin: 8px 0 0 0;'>                         <a href='https://www.ithaca.com/news/regional_news/greenidge-crypto-mining-facility-allowed-to-operate-despite-undermining-state-climate-goals/article_d8fed5d0-d9e8-11ef-a025-bbc6c8c2d875.html' target='_blank' style='color: #3498db; text-decoration: none; font-weight: bold;'>                             📄 Read Full Article →                         </a>                     </p>                 </div>             </div>             </div></div>`)[0];

                var html_23624de575ce048121e9ef531b3c28b8 = $(`<div id="html_23624de575ce048121e9ef531b3c28b8" style="width: 100.0%; height: 100.0%;">     <div style='max-width: 450px; max-height: 600px; overflow-y: auto; font-family: Arial, sans-serif;'>         <h3 style='margin-top: 0; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px;'>             Lake Mariner         </h3>         <p style='color: #7f8c8d; font-size: 13px;'>             <strong>County:</strong> Niagara<br>             <strong>Total Testimonies:</strong> 30         </p>     <hr style='border: 1px solid #ecf0f1;'>             <div style='margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-left: 3px solid #3498db; border-radius: 3px;'>                 <h4 style='margin: 0 0 10px 0; color: #2c3e50; font-size: 14px;'>                     Testimony 1 of 30                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "They told us the noise wouldn't be a problem. It's a problem. The constant hum keeps us up at night. And now they're expanding again."                 </p>                 <div style='font-size: 12px; color: #7f8c8d; margin-top: 10px;'>                     <p style='margin: 3px 0;'><strong>Date:</strong> 10-9-2025</p>                     <p style='margin: 3px 0;'><strong>Source:</strong> FingerLakes1</p>                     <p style='margin: 8px 0 0 0;'>                         <a href='https://www.fingerlakes1.com/2025/10/09/lansing-residents-call-for-answers-as-terawulf-data-center-plans-unravel/' target='_blank' style='color: #3498db; text-decoration: none; font-weight: bold;'>                             📄 Read Full Article →                         </a>                     </p>                 </div>             </div>                          <div style='margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-left: 3px solid #3498db; border-radius: 3px;'>                 <h4 style='margin: 0 0 10px 0; color: #2c3e50; font-size: 14px;'>                     Testimony 2 of 30                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "The sound is different all the time. Last Tuesday morning it was extremely loud, especially at 5 a.m. in the morning … Sometimes we don't hear it at all and sometimes it's excessively loud."                 </p>                 <div style='font-size: 12px; color: #7f8c8d; margin-top: 10px;'>                     <p style='margin: 3px 0;'><strong>Date:</strong> 11-14-2024</p>                     <p style='margin: 3px 0;'><strong>Source:</strong> Yahoo Tech</p>                     <p style='margin: 8px 0 0 0;'>                         <a href='https://tech.yahoo.com/ai/articles/ai-data-center-plan-approved-045900997.html' target='_blank' style='color: #3498db; text-decoration: none; font-weight: bold;'>                             📄 Read Full Article →                         </a>                     </p>                 </div>             </div>                          <div style='margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-left: 3px solid #3498db; border-radius: 3px;'>                 <h4 style='margin: 0 0 10px 0; color: #2c3e50; font-size: 14px;'>                     Testimony 3 of 30                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "I've lived in my house for 35 years. So I was there when the power plant was running at full bore and it was at night, not as bothersome as it is now. I think part of the problem is it's steady now. It's not peak and valley noise."                 </p>                 <div style='font-size: 12px; color: #7f8c8d; margin-top: 10px;'>                     <p style='margin: 3px 0;'><strong>Date:</strong> 10-9-2024</p>                     <p style='margin: 3px 0;'><strong>Source:</strong> Yahoo Tech</p>                     <p style='margin: 8px 0 0 0;'>                         <a href='https://www.yahoo.com/tech/somerset-data-center-pitches-buildings-035900867.html' target='_blank' style='color: #3498db; text-decoration: none; font-weight: bold;'>                             📄 Read Full Article →                         </a>                     </p>                 </div>             </div>                          <div style='margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-left: 3px solid #3498db; border-radius: 3px;'>                 <h4 style='margin: 0 0 10px 0; color: #2c3e50; font-size: 14px;'>                     Testimony 4 of 30                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "The noise is not abating and more people from further away are hearing it and are being disturbed by the noise."                 </p>                 <div style='font-size: 12px; color: #7f8c8d; margin-top: 10px;'>                     <p style='margin: 3px 0;'><strong>Date:</strong> 8-21-2024</p>                     <p style='margin: 3px 0;'><strong>Source:</strong> Yahoo News</p>                     <p style='margin: 8px 0 0 0;'>                         <a href='https://www.yahoo.com/news/somerset-residents-sound-off-data-035900559.html' target='_blank' style='color: #3498db; text-decoration: none; font-weight: bold;'>                             📄 Read Full Article →                         </a>                     </p>                 </div>             </div>                          <div style='margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-left: 3px solid #3498db; border-radius: 3px;'>                 <h4 style='margin: 0 0 10px 0; color: #2c3e50; font-size: 14px;'>                     Testimony 5 of 30                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "It's hit and miss. (Some of) the people who live near it say they don't hear anything. One person down the road from there says they hear it all the time. The other one, a mile or so south of there, says they they hear it all the time at their house, but then their neighbors don't hear it."                 </p>                 <div style='font-size: 12px; color: #7f8c8d; margin-top: 10px;'>                     <p style='margin: 3px 0;'><strong>Date:</strong> 1-11-2024</p>                     <p style='margin: 3px 0;'><strong>Source:</strong> Yahoo Finance</p>                     <p style='margin: 8px 0 0 0;'>                         <a href='https://finance.yahoo.com/news/third-building-completed-somerset-data-045900016.html' target='_blank' style='color: #3498db; text-decoration: none; font-weight: bold;'>                             📄 Read Full Article →                         </a>                     </p>                 </div>             </div>                          <div style='margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-left: 3px solid #3498db; border-radius: 3px;'>                 <h4 style='margin: 0 0 10px 0; color: #2c3e50; font-size: 14px;'>                     Testimony 6 of 30                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "Residents say the fans that cool some of the on-site computers produce a constant 95-decibel hum — about the same as standing next to a running lawnmower or motorcycle."                 </p>                 <div style='font-size: 12px; color: #7f8c8d; margin-top: 10px;'>                     <p style='margin: 3px 0;'><strong>Date:</strong> 9-11-2025</p>                     <p style='margin: 3px 0;'><strong>Source:</strong> The Ithaca Voice</p>                     <p style='margin: 8px 0 0 0;'>                         <a href='https://ithacavoice.org/2025/09/environmentalists-sound-alarm-as-plan-to-convert-cayuga ony 28 of 30                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "Those concerns have been heightened with the Somerset town and planning boards approving a proposed site plan from the company that outlines the construction of four additional buildings to house additional bitcoin mining facilities. Resident Betty Wolanyk claims that the noise has gotten louder since the last two buildings were erected over the past year. Wolanyk was one of about half a dozen residents to speak out on the issue during last week’s town board meeting."                 </p>                 <div style='font-size: 12px; color: #7f8c8d; margin-top: 10px;'>                     <p style='margin: 3px 0;'><strong>Date:</strong> Unknown</p>                     <p style='margin: 3px 0;'><strong>Source:</strong> Yahoo News</p>                     <p style='margin: 8px 0 0 0;'>                         <a href='https://www.yahoo.com/news/somerset-residents-sound-off-data-035900559.html?fr=sycsrp_catchall' target='_blank' style='color: #3498db; text-decoration: none; font-weight: bold;'>                             📄 Read Full Article →                         </a>                     </p>                 </div>             </div>                          <div style='margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-left: 3px solid #3498db; border-radius: 3px;'>                 <h4 style='margin: 0 0 10px 0; color: #2c3e50; font-size: 14px;'>                     Testimony 29 of 30                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "According to town Supervisor Jeff Dewart, crews also installed devices to somewhat mute the roughly 95 decibels that the fans generate. Advertisement Advertisement Dewart said that there isn’t much action officials can take until a proper noise study from the town is completed. Previo roar-to-town/article' target='_blank' style='color: #3498db; text-decoration: none; font-weight: bold;'>                             📄 Read Full Article →                         </a>                     </p>                 </div>             </div>                          <div style='margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-left: 3px solid #3498db; border-radius: 3px;'>                 <h4 style='margin: 0 0 10px 0; color: #2c3e50; font-size: 14px;'>                     Testimony 4 of 26                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "I'm going to be protesting till the hum is gone, basically, till I get the roar of the falls back because that's what I used to hear."                 </p>                 <div style='font-size: 12px; color: #7f8c8d; margin-top: 10px;'>                     <p style='margin: 3px 0;'><strong>Date:</strong> 11-28-2023</p>                     <p style='margin: 3px 0;'><strong>Source:</strong> Protos</p>                     <p style='margin: 8px 0 0 0;'>                         <a href='https://protos.com/bitcoin-mining-in-niagara-falls-goes-brrr-in-all-the-wrong-ways/' target='_blank' style='color: #3498db; text-decoration: none; font-weight: bold;'>                             📄 Read Full Article →                         </a>                     </p>                 </div>             </div>                          <div style='margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-left: 3px solid #3498db; border-radius: 3px;'>                 <h4 style='margin: 0 0 10px 0; color: #2c3e50; font-size: 14px;'>                     Testimony 5 of 26                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "The noise pollution of this industry is like nothing else that has been there."                 </p>                 <div style='font-size: 12px; color: #7f8c8d; margin-top: 10px;'>                     <p style='margin: 3px 0;'><strong>Date:</strong> 11-7-2022</p>                     <p style='margin: 3px 0;'><strong>Source:</strong> Euronews</p>                     <p style='margin: 8px 0 0 0;'>                         <a href='https://www.euronews.com/green/2022/11/07/bitcoin-mining-is-drowning-out-the-sound-of-niagara-falls-heres-how' target='_blank' style='color: #3498db; text-decoration: none; font-weight: bold;'>                             📄 Read Full Article →                         </a>                     </p>                 </div>             </div>                          <div style='margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-left: 3px solid #3498db; border-radius: 3px;'>                 <h4 style='margin: 0 0 10px 0; color: #2c3e50; font-size: 14px;'>                     Testimony 6 of 26                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "Blockfusion spent $25 million to convert a decommissioned coal power plant on Frontier Avenue into a cryptocurrency mining operation. The site became a source of concern for some neighbors who complained about the noise created during the process of Bitcoin mining. City officials later adopted a series of zoning code amendments that imposed strict new regulations on the operation of so-called “high-energy use industries.” Blockfusion’s Frontier Avenue operation shut down in November 2022 after the city notified the company that it was in violation of high-energy use industry amendments, prompting the company to immediately file an application for an operating permit that included changes to the operation in an effort to comply with the new regulations."                 </p>                 <div style='font-size: 12px; color: #7f8c8d; margin-top: 10px;'>                     <p style='margin: 3px 0;'><strong>Date:</strong> Unknown</p> des critical new noise data showing the data center will comply with the applicable standards. The second filing is a “Text Amendment Request to Revise the city’s High Energy Use Law,” which was enacted in late 2022."                 </p>                 <div style='font-size: 12px; color: #7f8c8d; margin-top: 10px;'>                     <p style='margin: 3px 0;'><strong>Date:</strong> Unknown</p>                     <p style='margin: 3px 0;'><strong>Source:</strong> Yahoo News</p>                     <p style='margin: 8px 0 0 0;'>                         <a href='https://www.yahoo.com/news/nfr-files-data-center-documents-035900861.html?fr=sycsrp_catchall' target='_blank' style='color: #3498db; text-decoration: none; font-weight: bold;'>                             📄 Read Full Article →                         </a>                     </p>                 </div>             </div>                          <div style='margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-left: 3px solid #3498db; border-radius: 3px;'>                 <h4 style='margin: 0 0 10px 0; color: #2c3e50; font-size: 14px;'>                     Testimony 16 of 26                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "The proposed data center campus would consist of nine buildings totaling over 1.2 million square feet, with NFR owning the majority of the land needed for the project. Concerns have been raised about noise, over-industrialization, and impacts on tourism and history, with a Planning Board workshop planned to address remaining questions and concerns before a vote in September. See more For more than four hours Wednesday night, Falls residents, lawyers, architects, consultants and engineers working for Niagara Falls Redevelopment (NFR) and members of the city’s Planning Board weighed, in sometimes excruciating detail, the pros and cons of a proposed Negotiated Planned Development District, also known as a Planned Unit District (PUD), for the purpose of developing a proposed $1.5 billion data center campus in the South End."                 </p>                 <div style='font-size: 12px; color: #7f8c8d; margin-top: 10px;'>                     <p style='margin: 3px 0;'><strong>Date:</strong> Unknown</p>                     <p style='margin: 3px 0;'><strong>Source:</strong> Yahoo News</p>                     <p style='margin: 8px 0 0 0;'>                         <a href='https://www.yahoo.com/news/articles/niagara-falls-planning-board-takes-035900927.html?fr=sycsrp_catchall' target='_blank' style='color: #3498db; text-decoration: none; font-weight: bold;'>                             📄 Read Full Article →                         </a>                     </p>                 </div>             </div>                          <div style='margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-left: 3px solid #3498db; border-radius: 3px;'>                 <h4 style='margin: 0 0 10px 0; color: #2c3e50; font-size: 14px;'>                     Testimony 17 of 26                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "Only two residents attended a public hearing in Niagara Falls regarding a request to modify the city’s zoning code restrictions on high-energy use industries, with one resident urging the Planning Board not to change the existing ordinance. The NFR affiliate is proposing to eliminate the ban on high-energy use industries outside industrial zones, increase permitted noise levels from high-energy facilities, and allow the city council to approve changes to setback and buffer requirements, arguing that these changes would make the law more flexible. The proposed zoning code changes by NFR would eliminate current high-energy use restrictions, potentially allowing data centers or bitcoin mines to be located next to homes in residential neighborhoods, prompting                <p style='margin: 8px 0 0 0;'>                         <a href='https://www.yahoo.com/news/niagara-falls-planning-board-hold-111900810.html?fr=sycsrp_catchall' target='_blank' style='color: #3498db; text-decoration: none; font-weight: bold;'>                             📄 Read Full Article →                         </a>                     </p>                 </div>             </div>                          <div style='margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-left: 3px solid #3498db; border-radius: 3px;'>                 <h4 style='margin: 0 0 10px 0; color: #2c3e50; font-size: 14px;'>                     Testimony 19 of 26                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "Creation of the overlay zoning district would allow BlockFusion to obtain a high-energy use industry operating permit from the city and resume its bitcoin mining operations. Almost two years after its future was left in limbo by inaction from the Niagara Falls City Council, city lawmakers in February agreed to accept a draft environmental impact statement (DEIS) from BlockFusion which declares that noise coming from its bitcoin mining operation is within the limits outlined in a series of city zoning ordinances that impose strict regulations on the operation of so-called “high-energy use industries.” Advertisement Advertisement The council’s action triggered the start of a public review process, required for the approval of a high-energy use operating permit for BlockFusion. Adopting the DEIS resolution opened a 31-day window for the public to submit comments on BlockFusion’s permit request."                 </p>                 <div style='font-size: 12px; color: #7f8c8d; margin-top: 10px;'>                     <p style='margin: 3px 0;'><strong>Date:</strong> Unknown</p>                     <p style='margin: 3px 0;'><strong>Source:</strong> Yahoo News</p> e: 12px; color: #7f8c8d; margin-top: 10px;'>                     <p style='margin: 3px 0;'><strong>Date:</strong> Unknown</p>                     <p style='margin: 3px 0;'><strong>Source:</strong> Yahoo News</p>                     <p style='margin: 8px 0 0 0;'>                         <a href='https://www.yahoo.com/news/niagara-falls-planning-board-hold-111900810.html?fr=sycsrp_catchall' target='_blank' style='color: #3498db; text-decoration: none; font-weight: bold;'>                             📄 Read Full Article →                         </a>                     </p>                 </div>             </div>                          <div style='margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-left: 3px solid #3498db; border-radius: 3px;'>                 <h4 style='margin: 0 0 10px 0; color: #2c3e50; font-size: 14px;'>                     Testimony 22 of 26                 </h4>                 <p style='font-style: italic; line-height: 1.6; color: #34495e; margin: 10px 0;'>                     "Complaints about the noise created by bitcoin mining facilities that had set up shop in the Falls led the city, in September 2022, to adopt a series of Zoning Code amendments that imposed strict new regulations on the operation of “high-energy use industries.” At a public hearing on the then-proposed amendments, one Falls resident described the noise coming from a nearby bitcoin mining facility as equivalent to “a 747 revving up on Buffalo Avenue.” The Zoning Code amendments restricted high-energy use facilities like data centers and bitcoin mining operations to locations that are zoned only for industrial uses. The amendments also created an “overlay” to the city’s current industrial zone requirements, adding restrictions that require larger setbacks from residential areas and imposing strict limits on the noise generated by the high energy use operations. Advertisement Advertisement When the new requirements went into effect in November 2022, BlockFusio
